<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>视频转GIF · 时间线选取 · 智能10MB压缩</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: linear-gradient(145deg, #0b1120 0%, #141e30 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      padding: 20px;
    }
    .card {
      max-width: 1300px;
      width: 100%;
      background: rgba(18, 28, 46, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(56, 189, 248, 0.15);
      border-radius: 48px;
      padding: 28px 32px;
      box-shadow: 0 30px 50px -10px #00000080, 0 0 0 1px #1e3a5f inset;
    }
    h1 {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
      font-size: 2.2rem;
      color: #ecf9ff;
      margin-bottom: 4px;
    }
    h1 i {
      color: #38bdf8;
      filter: drop-shadow(0 0 10px #38bdf8);
    }
    .server-warning {
      background: #fbbf2410;
      border-left: 6px solid #fbbf24;
      padding: 14px 20px;
      border-radius: 20px;
      margin: 16px 0 20px;
      color: #fcd34d;
      font-weight: 500;
      backdrop-filter: blur(8px);
    }
    .upload-area {
      background: #0f1a2b80;
      border: 2px dashed #2d4a6e;
      border-radius: 32px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 28px;
    }
    .upload-area:hover {
      border-color: #38bdf8;
      background: #0a1e2e;
    }
    .upload-area i {
      font-size: 48px;
      color: #6b9ac4;
      margin-bottom: 12px;
    }
    .video-preview-section {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      margin-bottom: 24px;
    }
    .video-container {
      flex: 2;
      min-width: 300px;
      background: #030a14;
      border-radius: 28px;
      padding: 16px;
      border: 1px solid #1f3a57;
    }
    video {
      width: 100%;
      max-height: 380px;
      border-radius: 18px;
      background: #000;
      display: block;
    }
    .timeline-panel {
      flex: 1.5;
      min-width: 400px;
      background: #0b1622e0;
      border-radius: 28px;
      padding: 24px 20px;
      border: 1px solid #1f3a57;
      backdrop-filter: blur(4px);
    }
    .timeline-header {
      display: flex;
      justify-content: space-between;
      color: #b0cbe9;
      margin-bottom: 16px;
    }
    .timeline-canvas-container {
      position: relative;
      width: 100%;
      height: 90px;
      margin: 20px 0 10px;
      user-select: none;
    }
    canvas#timelineCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: #0a121f;
      box-shadow: inset 0 2px 8px #00000080;
      cursor: crosshair;
    }
    .timeline-handles {
      position: relative;
      height: 30px;
      margin-top: -10px;
    }
    .time-stats {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      color: #aac8f0;
    }
    .time-input-group {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .time-input-group input {
      background: #0f1e2e;
      border: 1px solid #2f5370;
      border-radius: 40px;
      padding: 10px 14px;
      color: white;
      width: 110px;
      text-align: center;
      font-weight: 500;
    }
    .action-buttons {
      display: flex;
      gap: 20px;
      margin: 30px 0 15px;
    }
    .btn {
      background: #1e3245;
      border: none;
      padding: 16px 28px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #e0f0ff;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      border: 1px solid #3b6385;
      flex: 1;
      justify-content: center;
      box-shadow: 0 8px 14px #00000040;
      transition: 0.15s;
    }
    .btn-primary {
      background: #0e7ab3;
      border-color: #38bdf8;
      color: white;
    }
    .btn-primary:hover { background: #0f8fd6; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }
    .progress-container {
      height: 8px;
      background: #0c1725;
      border-radius: 20px;
      margin: 10px 0;
    }
    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #38bdf8, #a78bfa);
      border-radius: 20px;
    }
    .gif-result {
      margin-top: 28px;
      background: #07111e;
      border-radius: 28px;
      padding: 22px;
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .gif-preview img { max-width: 240px; border-radius: 18px; }
  </style>
</head>
<body>
<div class="card">
  <h1><i class="fas fa-clapperboard"></i> 帧格 · 时间线转GIF <span style="margin-left: auto; font-size: 1rem; background: #132a41; padding: 6px 20px; border-radius: 60px;"><i class="fas fa-bolt"></i> 4K/60fps · ≤1GB</span></h1>
  
  <div class="server-warning" id="serverWarning" style="display: none;">
    <i class="fas fa-server"></i> <strong>需要本地服务器运行</strong> —— 请勿直接双击打开HTML！请用 VS Code Live Server 或命令 `npx serve .` 启动，否则 FFmpeg 将因跨域限制无法工作。
  </div>

  <!-- 上传区 -->
  <div class="upload-area" id="dropZone">
    <i class="fas fa-cloud-upload-alt"></i>
    <div style="font-size: 1.2rem; font-weight: 500; color: #d9eaff;">点击或拖拽视频 (MP4 / MOV)</div>
    <div style="color: #6f9ac9;">支持高分辨率、高帧率，浏览器本地转换</div>
  </div>
  <input type="file" id="fileInput" accept="video/mp4,video/quicktime,video/mov,.mov,.mp4" style="display:none;">

  <div class="video-preview-section">
    <div class="video-container">
      <video id="videoPlayer" controls disablePictureInPicture controlsList="nodownload"></video>
      <div style="display: flex; justify-content: space-between; margin-top: 12px; color: #8db0da;">
        <span><i class="far fa-clock"></i> <span id="videoDuration">00:00</span></span>
        <span><i class="fas fa-expand"></i> <span id="videoResolution">-</span></span>
      </div>
    </div>
    <div class="timeline-panel">
      <div class="timeline-header">
        <span><i class="fas fa-cut"></i> 拖动选区 · 实时预览起点</span>
        <span><span id="selectedRangeDisplay">0.0s - 0.0s</span> / <span id="totalDurationLabel">0.0s</span></span>
      </div>
      
      <!-- 可视化时间轴 -->
      <div class="timeline-canvas-container">
        <canvas id="timelineCanvas" width="800" height="90"></canvas>
      </div>
      
      <div class="time-stats">
        <div><i class="fas fa-play"></i> 起点 <span id="startVal">0.0</span>s</div>
        <div><i class="fas fa-stop"></i> 终点 <span id="endVal">0.0</span>s</div>
        <div><i class="fas fa-hourglass-half"></i> 时长 <span id="durationVal">0.0</span>s</div>
      </div>
      
      <div class="time-input-group">
        <input type="number" id="startInput" step="0.1" min="0" value="0" placeholder="开始秒">
        <span style="color:#b0c6e0;">—</span>
        <input type="number" id="endInput" step="0.1" min="0" value="0" placeholder="结束秒">
        <button id="applyTimeBtn" style="background:#2d4a6e; border:none; border-radius:40px; padding:10px 16px; color:white;"><i class="fas fa-check"></i></button>
      </div>
      <div style="font-size:0.8rem; color:#6f9ac9; margin-top: 6px;"><i class="fas fa-mouse"></i> 拖动画布上的手柄 · 点击中间拖动选区</div>
    </div>
  </div>

  <div class="action-buttons">
    <button class="btn btn-primary" id="convertBtn" disabled><i class="fas fa-wand-magic-sparkles"></i> 生成GIF · 智能适配≤10MB</button>
    <button class="btn" id="downloadBtn" disabled><i class="fas fa-download"></i> 下载 GIF</button>
  </div>
  
  <div class="progress-container" id="progressWrapper" style="display:none;"><div class="progress-bar" id="progressBar"></div></div>
  <div id="progressText" style="margin:6px 0; color:#87b9e5;"></div>
  
  <div class="gif-result" id="resultArea" style="display:none;">
    <div class="gif-preview"><img id="gifPreviewImg" alt="GIF"></div>
    <div><span id="gifSizeBadge">0 KB</span> · <span id="gifResolution">-</span> · <span id="gifFps">- fps</span></div>
  </div>
  <div id="ffmpegState" style="margin-top: 18px; color: #6c9fd1;"><i class="fas fa-cog fa-spin"></i> <span id="stateText">检查运行环境…</span></div>
</div>

<script type="importmap">
  { "imports": { "@ffmpeg/ffmpeg": "https://esm.sh/@ffmpeg/ffmpeg@0.12.10", "@ffmpeg/util": "https://esm.sh/@ffmpeg/util@0.12.1" } }
</script>

<script type="module">
  import { FFmpeg } from '@ffmpeg/ffmpeg';
  import { fetchFile, toBlobURL } from '@ffmpeg/util';

  // 检查是否为本地文件打开 (origin null)
  if (location.origin === 'null' || location.protocol === 'file:') {
    document.getElementById('serverWarning').style.display = 'block';
  }

  // DOM 元素
  const video = document.getElementById('videoPlayer');
  const canvas = document.getElementById('timelineCanvas');
  const ctx = canvas.getContext('2d');
  const startInput = document.getElementById('startInput');
  const endInput = document.getElementById('endInput');
  const startVal = document.getElementById('startVal');
  const endVal = document.getElementById('endVal');
  const durationVal = document.getElementById('durationVal');
  const selectedRangeDisplay = document.getElementById('selectedRangeDisplay');
  const totalDurationLabel = document.getElementById('totalDurationLabel');
  const convertBtn = document.getElementById('convertBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const progressWrapper = document.getElementById('progressWrapper');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');
  const gifPreviewImg = document.getElementById('gifPreviewImg');
  const gifSizeBadge = document.getElementById('gifSizeBadge');
  const gifResolution = document.getElementById('gifResolution');
  const gifFps = document.getElementById('gifFps');
  const stateText = document.getElementById('stateText');
  const resultArea = document.getElementById('resultArea');
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileNameSpan = document.getElementById('fileName');
  const fileSizeSpan = document.getElementById('fileSize');
  const videoDurationSpan = document.getElementById('videoDuration');
  const videoResolutionSpan = document.getElementById('videoResolution');

  let ffmpeg = null;
  let videoFile = null;
  let videoDuration = 0;
  let originalWidth = 1280, originalHeight = 720, originalFps = 30;
  let gifBlobUrl = null;
  let isFFmpegReady = false;
  
  // 时间轴状态
  let startTime = 0, endTime = 0;
  let isDraggingStart = false, isDraggingEnd = false, isDraggingMid = false;
  let dragOffset = 0;

  // 初始化 FFmpeg
  async function initFFmpeg() {
    stateText.innerText = '加载 FFmpeg 核心 (约31MB) ...';
    ffmpeg = new FFmpeg();
    ffmpeg.on('progress', ({ progress }) => {
      progressBar.style.width = `${Math.round(progress * 100)}%`;
      progressText.innerText = `转换进度 ${Math.round(progress * 100)}%`;
    });
    const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';
    await ffmpeg.load({
      coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
      wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
    });
    isFFmpegReady = true;
    stateText.innerHTML = '<i class="fas fa-check-circle" style="color:#2ecc71;"></i> 引擎就绪';
    if (videoFile) convertBtn.disabled = false;
  }

  initFFmpeg().catch(e => {
    stateText.innerHTML = `<i class="fas fa-exclamation-triangle"></i> 引擎失败: 请通过本地服务器运行 (不要双击打开)`;
    document.getElementById('serverWarning').style.display = 'block';
    console.error(e);
  });

  // 文件处理
  function handleFile(file) {
    if (!file) return;
    videoFile = file;
    fileNameSpan.innerText = file.name;
    fileSizeSpan.innerText = (file.size / 1024 / 1024).toFixed(2) + ' MB';
    const url = URL.createObjectURL(file);
    video.src = url;
    video.onloadedmetadata = () => {
      videoDuration = video.duration;
      originalWidth = video.videoWidth;
      originalHeight = video.videoHeight;
      videoDurationSpan.innerText = formatTime(videoDuration);
      videoResolutionSpan.innerText = `${originalWidth}x${originalHeight}`;
      totalDurationLabel.innerText = videoDuration.toFixed(1) + 's';
      
      // 初始化选区为前3秒或全部
      endTime = Math.min(3.0, videoDuration);
      startTime = 0;
      updateTimeUI();
      drawTimeline();
      
      if (isFFmpegReady) convertBtn.disabled = false;
    };
  }

  function formatTime(sec) { const m = Math.floor(sec/60); const s = Math.floor(sec%60); return `${m}:${s.toString().padStart(2,'0')}`; }

  function updateTimeUI() {
    startInput.value = startTime.toFixed(1);
    endInput.value = endTime.toFixed(1);
    startVal.innerText = startTime.toFixed(1);
    endVal.innerText = endTime.toFixed(1);
    const dur = (endTime - startTime).toFixed(1);
    durationVal.innerText = dur;
    selectedRangeDisplay.innerText = `${startTime.toFixed(1)}s - ${endTime.toFixed(1)}s`;
    video.currentTime = startTime;
  }

  // 绘制时间轴 (含选区高亮、手柄)
  function drawTimeline() {
    const w = canvas.width = canvas.clientWidth;
    const h = canvas.height = 90;
    ctx.clearRect(0, 0, w, h);
    
    // 背景轨道
    ctx.fillStyle = '#0a1622';
    ctx.fillRect(0, 30, w, 30);
    ctx.fillStyle = '#1e3850';
    for (let i=0; i<=10; i++) {
      const x = i/10 * w;
      ctx.beginPath();
      ctx.moveTo(x, 30);
      ctx.lineTo(x, 60);
      ctx.strokeStyle = '#2f6080';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    
    // 选区
    const startX = (startTime / videoDuration) * w;
    const endX = (endTime / videoDuration) * w;
    ctx.fillStyle = '#38bdf850';
    ctx.fillRect(startX, 30, endX - startX, 30);
    ctx.strokeStyle = '#38bdf8';
    ctx.lineWidth = 2;
    ctx.strokeRect(startX, 30, endX - startX, 30);
    
    // 左右手柄
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#38bdf8';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(startX, 45, 10, 0, 2*Math.PI);
    ctx.fill();
    ctx.fillStyle = '#0ea5e9';
    ctx.beginPath();
    ctx.arc(endX, 45, 10, 0, 2*Math.PI);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // 当前播放指针
    const playX = (video.currentTime / videoDuration) * w;
    ctx.beginPath();
    ctx.moveTo(playX, 20);
    ctx.lineTo(playX-6, 30);
    ctx.lineTo(playX+6, 30);
    ctx.fillStyle = '#facc15';
    ctx.fill();
  }

  // 鼠标交互
  function handleCanvasMouseDown(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const w = rect.width;
    const t = (x / w) * videoDuration;
    const startX = (startTime / videoDuration) * w;
    const endX = (endTime / videoDuration) * w;
    const threshold = 15;
    
    if (Math.abs(x - startX) < threshold) { isDraggingStart = true; }
    else if (Math.abs(x - endX) < threshold) { isDraggingEnd = true; }
    else if (x > startX && x < endX) { isDraggingMid = true; dragOffset = t - startTime; }
    else { video.currentTime = Math.min(videoDuration, Math.max(0, t)); drawTimeline(); }
  }
  
  function handleCanvasMouseMove(e) {
    if (!videoDuration) return;
    const rect = canvas.getBoundingClientRect();
    const x = Math.min(rect.width, Math.max(0, e.clientX - rect.left));
    const t = (x / rect.width) * videoDuration;
    
    if (isDraggingStart) {
      startTime = Math.min(endTime - 0.1, Math.max(0, t));
      updateTimeUI(); drawTimeline();
    } else if (isDraggingEnd) {
      endTime = Math.max(startTime + 0.1, Math.min(videoDuration, t));
      updateTimeUI(); drawTimeline();
    } else if (isDraggingMid) {
      const newStart = Math.min(videoDuration - (endTime - startTime), Math.max(0, t - dragOffset));
      startTime = newStart;
      endTime = Math.min(videoDuration, newStart + (endTime - startTime));
      updateTimeUI(); drawTimeline();
    }
  }
  
  function handleCanvasMouseUp() { isDraggingStart = isDraggingEnd = isDraggingMid = false; }

  canvas.addEventListener('mousedown', handleCanvasMouseDown);
  window.addEventListener('mousemove', handleCanvasMouseMove);
  window.addEventListener('mouseup', handleCanvasMouseUp);
  
  document.getElementById('applyTimeBtn').addEventListener('click', () => {
    let s = parseFloat(startInput.value); let e = parseFloat(endInput.value);
    if (!isNaN(s) && !isNaN(e) && s < e && e <= videoDuration && s >= 0) {
      startTime = s; endTime = e; updateTimeUI(); drawTimeline();
    }
  });

  video.addEventListener('timeupdate', () => drawTimeline());
  window.addEventListener('resize', () => drawTimeline());

  // 转换逻辑 (智能适配10MB)
  convertBtn.addEventListener('click', async () => {
    if (!ffmpeg || !videoFile) return;
    progressWrapper.style.display = 'block'; resultArea.style.display = 'none';
    const duration = endTime - startTime;
    await convertWithSizeTarget(startTime, duration);
  });

  async function convertWithSizeTarget(start, dur) {
    const inputName = 'in.' + (videoFile.name.includes('.mov')?'mov':'mp4');
    await ffmpeg.writeFile(inputName, await fetchFile(videoFile));
    let w = originalWidth, h = originalHeight, fps = Math.min(originalFps, 30);
    let bestData = null, bestSize = Infinity, target = 10*1024*1024;
    for (let attempt=0; attempt<6; attempt++) {
      progressText.innerText = `尝试 ${attempt+1}: ${w}x${h} ${fps}fps`;
      const paletteCmd = ['-ss', start.toString(), '-t', dur.toString(), '-i', inputName, '-vf', `fps=${fps},scale=${w}:${h}:flags=lanczos,palettegen`, '-y', 'p.png'];
      await ffmpeg.exec(paletteCmd);
      const gifCmd = ['-ss', start.toString(), '-t', dur.toString(), '-i', inputName, '-i', 'p.png', '-lavfi', `fps=${fps},scale=${w}:${h} [x]; [x][1:v] paletteuse=dither=bayer`, '-y', 'out.gif'];
      await ffmpeg.exec(gifCmd);
      const data = await ffmpeg.readFile('out.gif');
      if (data.length <= target) { bestData = data; break; }
      if (data.length < bestSize) { bestData = data; bestSize = data.length; }
      if (w > 480) { w = Math.floor(w*0.7); h = Math.floor(h*0.7); if(w%2) w--; if(h%2) h--; }
      else fps = Math.max(8, fps-4);
    }
    const blob = new Blob([bestData.buffer], {type:'image/gif'});
    gifBlobUrl = URL.createObjectURL(blob);
    gifPreviewImg.src = gifBlobUrl;
    gifSizeBadge.innerText = (blob.size/1024/1024).toFixed(2)+' MB';
    gifResolution.innerText = `${w}x${h}`; gifFps.innerText = fps+' fps';
    resultArea.style.display = 'flex'; downloadBtn.disabled = false;
    progressWrapper.style.display = 'none';
    await ffmpeg.deleteFile(inputName); await ffmpeg.deleteFile('p.png'); await ffmpeg.deleteFile('out.gif');
  }

  downloadBtn.addEventListener('click', ()=>{
    if(gifBlobUrl){ const a=document.createElement('a'); a.href=gifBlobUrl; a.download='clip.gif'; a.click(); }
  });

  // 上传事件
  dropZone.addEventListener('click', ()=>fileInput.click());
  fileInput.addEventListener('change', e=>{ if(e.target.files[0]) handleFile(e.target.files[0]); });
  dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e=>{ e.preventDefault(); dropZone.classList.remove('drag-over'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
</script>
</body>
</html>
